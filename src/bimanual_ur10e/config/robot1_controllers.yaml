# === controller_manager: only need TYPE ===
/controller_manager:
  ros__parameters:
    update_rate: 500
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    io_and_status_controller:
      type: ur_controllers/GPIOController
    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster
    force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    tcp_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster
    ur_configuration_controller:
      type: ur_controllers/URConfigurationController
    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController
    forward_position_controller:
      type: position_controllers/JointGroupPositionController
    forward_effort_controller:
      type: effort_controllers/JointGroupEffortController
    force_mode_controller:
      type: ur_controllers/ForceModeController
    passthrough_trajectory_controller:
      type: ur_controllers/PassthroughTrajectoryController
    freedrive_mode_controller:
      type: ur_controllers/FreedriveModeController
    tool_contact_controller:
      type: ur_controllers/ToolContactController

# === Params per controller ===
/scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - robot1_shoulder_pan_joint
      - robot1_shoulder_lift_joint
      - robot1_elbow_joint
      - robot1_wrist_1_joint
      - robot1_wrist_2_joint
      - robot1_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      robot1_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }
    speed_scaling_interface_name: robot1_speed_scaling/speed_scaling_factor

/joint_trajectory_controller:
  ros__parameters:
    joints:
      - robot1_shoulder_pan_joint
      - robot1_shoulder_lift_joint
      - robot1_elbow_joint
      - robot1_wrist_1_joint
      - robot1_wrist_2_joint
      - robot1_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0

/forward_velocity_controller:
  ros__parameters:
    joints:
      - robot1_shoulder_pan_joint
      - robot1_shoulder_lift_joint
      - robot1_elbow_joint
      - robot1_wrist_1_joint
      - robot1_wrist_2_joint
      - robot1_wrist_3_joint
    interface_name: velocity

/forward_position_controller:
  ros__parameters:
    joints:
      - robot1_shoulder_pan_joint
      - robot1_shoulder_lift_joint
      - robot1_elbow_joint
      - robot1_wrist_1_joint
      - robot1_wrist_2_joint
      - robot1_wrist_3_joint

/forward_effort_controller:
  ros__parameters:
    joints:
      - robot1_shoulder_pan_joint
      - robot1_shoulder_lift_joint
      - robot1_elbow_joint
      - robot1_wrist_1_joint
      - robot1_wrist_2_joint
      - robot1_wrist_3_joint
    interface_name: effort

/io_and_status_controller:
  ros__parameters:
    tf_prefix: robot1_

/speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0
    tf_prefix: robot1_

/force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: robot1_tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: robot1_tool0

/tcp_pose_broadcaster:
  ros__parameters:
    frame_id: robot1_base
    pose_name: robot1_tcp_pose
    tf:
      child_frame_id: robot1_tool0_controller

/ur_configuration_controller:
  ros__parameters:
    tf_prefix: robot1_

/force_mode_controller:
  ros__parameters:
    tf_prefix: robot1_

/passthrough_trajectory_controller:
  ros__parameters:
    tf_prefix: robot1_

/freedrive_mode_controller:
  ros__parameters:
    tf_prefix: robot1_

/tool_contact_controller:
  ros__parameters:
    tf_prefix: robot1_